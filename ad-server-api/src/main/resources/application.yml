server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/adserving
    username: adserving
    password: adserving
    hikari:
      maximum-pool-size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379

ad-serving:
  track-token:
    secret: change-me-in-production-this-is-a-dev-secret-key
  cache:
    ad-metadata-ttl-seconds: 5
    ad-metadata-max-size: 10000
